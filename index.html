<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🗳️ Democracy Gaming</title>

  <!--
  ══════════════════════════════════════════════════════════════════
  SUPABASE SETUP — Run this SQL in your Supabase SQL Editor first:
  ══════════════════════════════════════════════════════════════════

  CREATE TABLE game_sessions (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    phase TEXT NOT NULL DEFAULT 'nominating',
    admin_password TEXT NOT NULL,
    max_noms_per_person INTEGER DEFAULT 2,
    winner_game_id UUID,
    created_at TIMESTAMPTZ DEFAULT NOW()
  );

  CREATE TABLE nominations (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    session_id UUID REFERENCES game_sessions(id) ON DELETE CASCADE,
    game_name TEXT NOT NULL,
    submitted_by TEXT NOT NULL,
    created_at TIMESTAMPTZ DEFAULT NOW()
  );

  CREATE TABLE matchups (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    session_id UUID REFERENCES game_sessions(id) ON DELETE CASCADE,
    template_id TEXT NOT NULL,
    bracket TEXT NOT NULL,
    round INTEGER NOT NULL,
    position INTEGER NOT NULL,
    game1_id UUID REFERENCES nominations(id),
    game2_id UUID REFERENCES nominations(id),
    winner_id UUID REFERENCES nominations(id),
    loser_id UUID REFERENCES nominations(id),
    status TEXT DEFAULT 'pending',
    created_at TIMESTAMPTZ DEFAULT NOW()
  );

  CREATE TABLE votes (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    matchup_id UUID REFERENCES matchups(id) ON DELETE CASCADE,
    game_id UUID REFERENCES nominations(id),
    device_token TEXT NOT NULL,
    created_at TIMESTAMPTZ DEFAULT NOW(),
    UNIQUE(matchup_id, device_token)
  );

  ALTER TABLE game_sessions DISABLE ROW LEVEL SECURITY;
  ALTER TABLE nominations    DISABLE ROW LEVEL SECURITY;
  ALTER TABLE matchups       DISABLE ROW LEVEL SECURITY;
  ALTER TABLE votes          DISABLE ROW LEVEL SECURITY;

  Then go to: Supabase Dashboard → Database → Replication
  Enable replication for: game_sessions, nominations, matchups, votes
  ══════════════════════════════════════════════════════════════════
  -->

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg:        #0c0b09;
      --bg2:       #111009;
      --surface:   #161410;
      --surface2:  #1e1b14;
      --surface3:  #252118;
      --border:    #2e2a1f;
      --border2:   #3d3828;
      --gold:      #c9a227;
      --gold-dim:  rgba(201,162,39,0.12);
      --gold-bright:#e8bc3a;
      --cream:     #f0e6c8;
      --cream-dim: #a89878;
      --cream-muted:#5a5040;
      --green:     #4d9e6e;
      --green-dim: rgba(77,158,110,0.15);
      --red:       #a83232;
      --red-dim:   rgba(168,50,50,0.15);
      --text:      #ede3cc;
      --text-dim:  #9a8e74;
      --text-muted:#4a4234;
      --font-h: 'Playfair Display', Georgia, serif;
      --font-b: 'Outfit', sans-serif;
      --r: 3px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      font-weight: 300;
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }



    button {
      cursor: pointer; font-family: var(--font-b); font-weight: 500;
      border-radius: var(--r); transition: all 0.2s; border: none;
    }
    input { font-family: var(--font-b); font-size: 15px; font-weight: 300; }
    a { color: var(--gold); }

    /* ── Ornament ── */
    .ornament { color: var(--gold); opacity: 0.5; letter-spacing: 4px; font-size: 11px; display: block; text-align: center; margin: 6px 0; }

    /* ── Header ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: rgba(12,11,9,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; z-index: 200;
    }
    .logo {
      font-family: var(--font-h); font-size: 16px; letter-spacing: 2px;
      color: var(--gold); font-style: italic;
    }
    #header-right { display: flex; align-items: center; gap: 14px; }
    #header-nick { font-size: 12px; color: var(--text-dim); letter-spacing: 0.5px; }
    #header-phase {
      font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 2px;
      padding: 3px 10px; border-radius: 2px;
      border: 1px solid var(--border2); color: var(--text-muted);
    }
    #header-phase.ph-nominating { border-color: var(--gold); color: var(--gold); }
    #header-phase.ph-bracket    { border-color: var(--green); color: var(--green); }
    #header-phase.ph-complete   { border-color: var(--gold-bright); color: var(--gold-bright); }
    .btn-admin-toggle {
      background: none; border: 1px solid var(--border2);
      color: var(--text-muted); padding: 5px 12px;
      font-size: 9px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; border-radius: 2px;
      transition: all 0.2s;
    }
    .btn-admin-toggle:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Nav tabs ── */
    #nav-tabs {
      position: fixed; top: 56px; left: 0; right: 0;
      display: none; background: var(--bg2);
      border-bottom: 1px solid var(--border); z-index: 199;
    }
    #nav-tabs.show { display: flex; }
    .nav-tab {
      flex: 1; padding: 11px 8px; background: none; border: none;
      font-family: var(--font-b); font-size: 9px; font-weight: 500;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid transparent; transition: all 0.2s;
      position: relative;
    }
    .nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .nav-tab:hover:not(.active) { color: var(--text-dim); background: var(--surface2); }
    .nav-tab .vote-ping {
      position: absolute; top: 8px; right: calc(50% - 18px);
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--gold); display: none;
      animation: ping 1s ease-in-out infinite;
    }
    .nav-tab.has-ping .vote-ping { display: block; }
    @keyframes ping { 0%,100%{opacity:.2;transform:scale(.7)} 50%{opacity:1;transform:scale(1.3)} }

    /* ── Screens ── */
    .screen { display: none; padding: 24px 22px; padding-top: 114px; max-width: 800px; margin: 0 auto; }
    .screen.active { display: block; }
    .screen-wide { max-width: none; padding-left: 0; padding-right: 0; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 1px solid var(--border2);
      border-radius: var(--r);
      padding: 22px;
    }
    .divider {
      border: none; margin: 18px 0;
      height: 1px; background: linear-gradient(to right, transparent, var(--border2), transparent);
    }
    label {
      display: block; font-size: 9px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--text-dim); margin-bottom: 7px;
    }
    input[type="text"], input[type="password"], input[type="number"] {
      width: 100%; padding: 10px 14px;
      background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r);
      color: var(--text); outline: none; transition: all 0.2s;
    }
    input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold-dim); }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; font-size: 12px; letter-spacing: 0.5px; border-radius: var(--r); font-weight: 500; }
    .btn-sm { padding: 6px 13px; font-size: 11px; }
    .btn-cyan  { background: var(--gold); color: #0c0b09; }
    .btn-cyan:hover  { background: var(--gold-bright); }
    .btn-amber { background: var(--gold); color: #0c0b09; }
    .btn-amber:hover { background: var(--gold-bright); }
    .btn-green { background: var(--green); color: white; }
    .btn-green:hover { filter: brightness(1.15); }
    .btn-red   { background: var(--red); color: white; }
    .btn-red:hover   { filter: brightness(1.15); }
    .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border2); }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .btn:disabled { opacity: .3; cursor: not-allowed; }

    /* ── Lobby ── */
    #screen-lobby {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding-top: 0; text-align: center;
      position: relative;
    }
    #screen-lobby.active { display: flex; }
    #lobby-bg {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background-size: cover; background-position: center;
      background-repeat: no-repeat;
    }
    #lobby-bg::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(to bottom, rgba(12,11,9,0.72) 0%, rgba(12,11,9,0.88) 60%, rgba(12,11,9,1) 100%);
    }
    #lobby-inner { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .lobby-eyebrow {
      font-size: 10px; font-weight: 500; letter-spacing: 5px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 20px; opacity: 0.8;
    }
    .lobby-title {
      font-family: var(--font-h); font-size: clamp(52px,11vw,96px);
      font-style: italic; font-weight: 900;
      letter-spacing: 1px; color: var(--cream);
      line-height: 0.95; margin-bottom: 16px;
    }
    .lobby-rule {
      width: 120px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 14px auto;
    }
    .lobby-sub { font-size: 12px; color: var(--text-dim); margin-bottom: 44px; letter-spacing: 1px; font-style: italic; }
    .lobby-card { width: 100%; max-width: 360px; }
    .lobby-card h2 { font-family: var(--font-h); font-size: 20px; font-style: italic; margin-bottom: 20px; color: var(--cream); }

    /* ── Nominations ── */
    .nom-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px; flex-wrap: wrap; gap: 12px; }
    .nom-header h1 { font-family: var(--font-h); font-size: 30px; font-style: italic; color: var(--cream); }
    .count-badge {
      font-size: 10px; letter-spacing: 1px; color: var(--gold); padding: 4px 12px;
      border: 1px solid var(--gold); border-radius: 2px; background: var(--gold-dim);
    }
    .nom-form { display: flex; gap: 8px; margin-top: 12px; }
    .nom-form input { flex: 1; }
    .nom-list { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
    .nom-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: var(--r);
      transition: border-color 0.15s;
    }
    .nom-item.mine { border-left: 2px solid var(--gold); background: var(--gold-dim); }
    .nom-game { font-weight: 500; flex: 1; color: var(--text); }
    .nom-by { font-size: 11px; color: var(--text-muted); font-style: italic; }
    .nom-status-msg { margin-bottom: 14px; font-size: 14px; }

    /* ── Bracket ── */
    #screen-bracket { max-width: none; overflow-x: auto; padding-left: 0; padding-right: 0; }
    .bracket-wrap { padding: 0 22px 40px; min-width: max-content; }
    .bracket-section { margin-bottom: 30px; }
    .b-section-label {
      font-family: var(--font-b); font-size: 9px; font-weight: 500;
      letter-spacing: 3px; text-transform: uppercase;
      padding: 4px 14px; margin-bottom: 10px;
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid var(--border2); border-radius: 2px; color: var(--text-dim);
    }
    .b-section-label.winners { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    .b-section-label.losers  { border-color: var(--red);  color: var(--red);  background: var(--red-dim); }
    .b-section-label.gf      { border-color: var(--gold-bright); color: var(--gold-bright); background: var(--gold-dim); }
    .bracket-rounds { display: flex; align-items: flex-start; }
    .bracket-col { display: flex; flex-direction: column; min-width: 205px; }
    .round-label { font-size: 9px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); text-align: center; padding: 4px; margin-bottom: 4px; }
    .round-matches { display: flex; flex-direction: column; gap: 6px; }
    .b-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      overflow: hidden; margin: 2px 8px; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .b-card.st-voting    { border-color: var(--gold); box-shadow: 0 0 20px rgba(201,162,39,0.15); }
    .b-card.st-revealing { border-color: var(--green); box-shadow: 0 0 20px rgba(77,158,110,0.15); }
    .b-card.st-bye       { opacity: .35; }
    .b-card-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 9px; border-bottom: 1px solid var(--border);
      font-size: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--text-muted); background: var(--surface2);
    }
    .st-pill { padding: 1px 7px; border-radius: 2px; font-size: 8px; font-weight: 500; letter-spacing: 1px; }
    .st-pill-pending    { background: var(--surface3); color: var(--text-muted); }
    .st-pill-voting     { background: var(--gold-dim); color: var(--gold); }
    .st-pill-revealing  { background: var(--green-dim); color: var(--green); }
    .st-pill-complete   { background: var(--surface3); color: var(--text-muted); }
    .st-pill-bye        { background: var(--surface3); color: var(--text-muted); }
    .b-game { padding: 8px 10px; font-size: 12px; font-weight: 400; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); text-align: center; }
    .b-game + .b-game { border-top: 1px solid var(--border); }
    .b-game.tbd   { color: var(--text-muted); font-style: italic; }
    .b-game.won   { color: var(--gold); }
    .b-game.lost  { color: var(--text-muted); text-decoration: line-through; opacity: .5; }
    .b-vs {
      padding: 2px 10px; text-align: center; font-size: 8px; font-weight: 500;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-muted); background: var(--surface2);
      border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    }
    .b-actions { display: flex; gap: 4px; flex-wrap: wrap; padding: 6px 8px; background: var(--surface2); border-top: 1px solid var(--border); }
    .b-spacer { height: 10px; }

    /* ── Inline voting on bracket cards ── */
    .b-vote-area { border-top: 1px solid var(--border); }
    .b-vote-row {
      display: flex; align-items: center; gap: 0;
      padding: 5px 8px; cursor: pointer; transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .b-vote-row:last-child { border-bottom: none; }
    .b-vote-row:hover:not(.voted):not(.revealed) { background: var(--gold-dim); }
    .b-vote-row.my-vote { background: var(--gold-dim); }
    .b-vote-row.win-row  { background: var(--green-dim); }
    .b-vote-row.lose-row { opacity: .45; }
    .b-vote-name { flex: 1; font-size: 12px; font-weight: 500; color: var(--text); padding: 4px 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; }
    .b-vote-name.tbd { color: var(--text-muted); font-style: italic; }
    .b-vote-check { font-size: 10px; color: var(--gold); margin-left: 6px; flex-shrink: 0; }
    .b-vote-count { font-size: 11px; color: var(--gold); font-weight: 600; margin-left: 6px; flex-shrink: 0; min-width: 20px; text-align: right; }
    .b-vote-footer {
      padding: 5px 10px; font-size: 10px; color: var(--text-muted);
      letter-spacing: 0.5px; background: var(--surface2);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    /* ── Vote screen ── */
    #screen-vote {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      min-height: calc(100vh - 80px); text-align: center;
    }
    #screen-vote.active { display: flex; }
    .vote-label { font-size: 9px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
    .vote-round-name { font-family: var(--font-h); font-size: 26px; font-style: italic; color: var(--cream); margin-bottom: 30px; }
    .vote-arena { display: flex; align-items: stretch; width: 100%; max-width: 580px; gap: 0; }
    .vote-card {
      flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      padding: 32px 20px; cursor: pointer; transition: all 0.2s;
      position: relative; overflow: hidden;
    }
    .vote-card:not(.voted):not(.revealing):hover {
      border-color: var(--gold); background: var(--surface2);
      box-shadow: 0 0 30px rgba(201,162,39,0.12);
    }
    .vote-card.my-pick { border-color: var(--gold); background: var(--gold-dim); box-shadow: 0 0 30px rgba(201,162,39,0.18); }
    .vote-card.win-reveal { border-color: var(--green); background: var(--green-dim); box-shadow: 0 0 30px rgba(77,158,110,0.2); }
    .vote-card.lose-reveal { opacity: .35; }
    .vote-card.tie-reveal  { border-color: var(--gold); background: var(--gold-dim); }
    .v-my-badge {
      position: absolute; top: 10px; right: 10px;
      background: var(--gold); color: #0c0b09; font-size: 8px; font-weight: 600;
      padding: 2px 8px; border-radius: 2px; letter-spacing: 1px; text-transform: uppercase;
    }
    .v-game-name { font-family: var(--font-h); font-size: 24px; font-style: italic; color: var(--cream); margin-bottom: 8px; }
    .v-vote-count { font-family: var(--font-h); font-size: 52px; font-weight: 900; color: var(--gold); margin: 4px 0 2px; line-height: 1; }
    .v-vote-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
    .vote-vs {
      display: flex; align-items: center; padding: 0 16px;
      font-family: var(--font-h); font-size: 18px; font-style: italic;
      color: var(--text-muted); flex-shrink: 0;
    }
    .vote-status { margin-top: 22px; font-size: 13px; color: var(--text-dim); letter-spacing: 0.3px; }
    .vote-bar { display: flex; height: 2px; width: 100%; max-width: 580px; margin-top: 14px; background: var(--surface3); }
    .vote-bar .bg1 { background: var(--gold); transition: width .6s ease; }
    .vote-bar .bg2 { background: var(--red); transition: width .6s ease; }
    .vote-admin-row { margin-top: 22px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .pulse-row { display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--text-muted); font-size: 13px; font-style: italic; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); animation: ping .9s ease-in-out infinite; }
    .tie-pick { margin-top: 14px; display: none; }
    .tie-pick-label { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-style: italic; }
    .tie-pick-btns { display: flex; gap: 8px; justify-content: center; }

    /* Voter chips */
    .v-voters { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
    .v-voter-chip {
      font-size: 10px; padding: 2px 9px; border-radius: 2px;
      background: var(--surface3); border: 1px solid var(--border2);
      color: var(--text-dim); letter-spacing: 0.5px;
    }

    /* ── Coin flip overlay ── */
    #flip-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(8,7,5,0.97);
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    #flip-overlay.active { display: flex; }
    .flip-eyebrow {
      font-size: 9px; font-weight: 500; letter-spacing: 5px; text-transform: uppercase;
      color: var(--gold); opacity: 0.7; margin-bottom: 16px;
    }
    .flip-title {
      font-family: var(--font-h); font-size: clamp(28px,6vw,52px);
      font-style: italic; color: var(--cream); margin-bottom: 40px;
      line-height: 1.1;
    }
    .flip-arena {
      display: flex; align-items: center; gap: 0;
      width: 100%; max-width: 680px; margin-bottom: 40px;
    }
    .flip-card {
      flex: 1; padding: 28px 20px; border: 1px solid var(--border2);
      border-radius: var(--r); background: var(--surface);
      transition: all 0.25s ease;
    }
    .flip-card.active-pick {
      border-color: var(--gold);
      background: var(--gold-dim);
      box-shadow: 0 0 60px rgba(201,162,39,0.3);
      transform: scale(1.04);
    }
    .flip-card.winner-pick {
      border-color: var(--gold-bright);
      background: var(--gold-dim);
      box-shadow: 0 0 80px rgba(232,188,58,0.45);
      transform: scale(1.06);
    }
    .flip-card.loser-pick { opacity: 0.25; transform: scale(0.96); }
    .flip-game-name {
      font-family: var(--font-h); font-size: clamp(18px,3.5vw,30px);
      font-style: italic; color: var(--cream); line-height: 1.2;
    }
    .flip-vs {
      padding: 0 20px; font-family: var(--font-h);
      font-size: 22px; font-style: italic; color: var(--text-muted); flex-shrink: 0;
    }
    .flip-indicator {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;

// ══════════════════════════════════════════════════════════════════
// ▌ DYNAMIC DOUBLE ELIMINATION BRACKET GENERATOR
//   Works for any number of games — rounds up to next power of 2,
//   extra slots become BYEs that auto-advance during generation.
//   b: 'W'=Winners 'L'=Losers 'GF'=Grand Final
//   winTo/loseTo: template_id of destination (null = champion/out)
//   winS/loseS:   destination slot (1=game1, 2=game2)
// ══════════════════════════════════════════════════════════════════
function buildTemplate(n) {
  // Round up to next power of 2, minimum bracket size of 4
  let size = 4;
  while (size < n) size *= 2;
  const k = Math.log2(size);       // number of winners rounds
  const lbRounds = 2 * (k - 1);   // total losers bracket rounds
  const tpl = [];

  // ── Winners bracket ─────────────────────────────────────────────
  for (let r = 1; r <= k; r++) {
    const count = size >> r; // size / 2^r matches in this round
    for (let p = 1; p <= count; p++) {
      const id = `W-R${r}-P${p}`;
      let winTo, winS, loseTo, loseS;

      // Winner routing: next W round (or GF if this is WF)
      if (r === k) { winTo = 'GF-P1'; winS = 1; }
      else { winTo = `W-R${r+1}-P${Math.ceil(p/2)}`; winS = (p%2===1)?1:2; }

      // Loser routing: drops into losers bracket
      if (r === 1) {
        // W-R1 losers pair up into L-R1: (P1,P2)→L-R1-P1, (P3,P4)→L-R1-P2, etc.
        loseTo = `L-R1-P${Math.ceil(p/2)}`; loseS = (p%2===1)?1:2;
      } else if (r === k) {
        // Winners Final loser → very last LB round, slot 2
        loseTo = `L-R${lbRounds}-P1`; loseS = 2;
      } else {
        // W-Rr (2≤r<k) loser → even LB round L-R(2*(r-1)), same position, slot 2
        loseTo = `L-R${2*(r-1)}-P${p}`; loseS = 2;
      }

      tpl.push({id, b:'W', r, p, winTo, winS, loseTo, loseS});
    }
  }

  // ── Losers bracket ───────────────────────────────────────────────
  // Rounds alternate: odd = pure LB (winners advance 1-to-1 to next even round)
  //                   even = merge round (LB winners pair up + W losers drop in)
  for (let lr = 1; lr <= lbRounds; lr++) {
    const count = Math.pow(2, k - 1 - Math.ceil(lr/2));
    for (let p = 1; p <= count; p++) {
      const id = `L-R${lr}-P${p}`;
      let winTo, winS;

      if (lr === lbRounds) {
        // Last LB round winner → GF slot 2
        winTo = 'GF-P1'; winS = 2;
      } else if (lr % 2 === 1) {
        // Odd LB round: 1-to-1 into next (even) round, slot 1
        // (slot 2 will be filled by a W loser dropping in)
        winTo = `L-R${lr+1}-P${p}`; winS = 1;
      } else {
        // Even LB round: pair up into next (odd) round
        winTo = `L-R${lr+1}-P${Math.ceil(p/2)}`; winS = (p%2===1)?1:2;
      }

      tpl.push({id, b:'L', r:lr, p, winTo, winS, loseTo:null, loseS:null});
    }
  }

  // ── Grand Final ───────────────────────────────────────────────────
  tpl.push({id:'GF-P1', b:'GF', r:1, p:1, winTo:null, winS:null, loseTo:null, loseS:null});
  return tpl;
}

  if(coinFlip?.matchupId===matchup.id) return;
  coinFlip={matchupId:matchup.id, running:true, winnerId:null, loserId:null};

  const games=[
    {id:matchup.game1_id, name:g1?.game_name||'Game 1'},

  let delay=60;

  const phrases=[
    'Reading the market...','Consulting the Oracle...','Flipping the coin...',
    'Asking the algorithm...','Bribing the judge...','Calculating fate...',
    'Democracy in action...','Let the gods decide...'

  function flip(){
    if(!coinFlip||coinFlip.matchupId!==matchup.id) return;

    document.getElementById('flip-card-1').className='flip-card'+(cur===0?' active-pick':'');

      document.getElementById('flip-card-1').className='flip-card'+(cur===0?' winner-pick':' loser-pick');
      document.getElementById('flip-card-2').className='flip-card'+(cur===1?' winner-pick':' loser-pick');
      document.getElementById('flip-indicator').textContent='The oracle has spoken.';

      return;
    }

    if(flips > totalFlips*0.55) delay = Math.min(delay*1.38, 480);

}

// ▌ BRACKET GENERATION
// ══════════════════════════════════════════════════════════════════
async function generateBracket(){
  const shuffled=[...nominations].sort(()=>Math.random()-.5);
  const tpl=buildTemplate(shuffled.length);

  // Insert all matchup rows
  const rows=tpl.map(t=>({
    session_id:session.id, template_id:t.id,
    bracket:t.b==='W'?'winners':t.b==='L'?'losers':'grand_final',
    round:t.r, position:t.p, status:'pending',
  }));
  const {data:inserted,error}=await sb.from('matchups').insert(rows).select();
  if(error){ toast('Error generating bracket: '+error.message,'err'); return false; }

  // Build tplId → DB row map (local, not global matchups yet)
  const dbMap={};
  inserted.forEach(m=>dbMap[m.template_id]=m);

  // Assign seeds to W-R1 matchups using interleaved seeding:
  // Fill game1 slots first (indices 0..n-1), then game2 slots (indices n..2n-1).
  // This spreads byes evenly across matchups instead of stacking double-byes at the end.
  const r1s=inserted.filter(m=>m.bracket==='winners'&&m.round===1).sort((a,b)=>a.position-b.position);
  const numR1=r1s.length;
  for(let i=0;i<r1s.length;i++){
    const g1=shuffled[i]||null, g2=shuffled[i+numR1]||null;
    const upd={};
    if(g1) upd.game1_id=g1.id;
    if(g2) upd.game2_id=g2.id;
    if(g1&&!g2){ upd.winner_id=g1.id; upd.status='complete'; }
    else if(!g1&&g2){ upd.winner_id=g2.id; upd.status='complete'; }
    else if(!g1&&!g2){ upd.status='bye'; }
    if(Object.keys(upd).length){
      await sb.from('matchups').update(upd).eq('id',r1s[i].id);
      Object.assign(dbMap[r1s[i].template_id],upd);
    }
  }

  // Route W-R1 winners/losers forward + cascade byes
  await cascadeByes(dbMap,tpl);

  // Set session to bracket phase
  await sb.from('game_sessions').update({phase:'bracket'}).eq('id',session.id);
  return true;
}

async function cascadeByes(dbMap,tpl){
  // Route winners and losers from completed matchups
  // Then cascade: if destination gets one slot filled and other feeder is 'bye', auto-advance
  let changed=true;
  while(changed){
    changed=false;
    for(const tplId in dbMap){
      const m=dbMap[tplId];
      // Route completed matchups
      if((m.status==='complete'||m.status==='bye')&&m._routed!==true){
        m._routed=true;
        changed=true;
        const t=tpl.find(x=>x.id===tplId);
        if(!t) continue;
        // Route winner
        if(t.winTo&&m.winner_id&&dbMap[t.winTo]){
          const dest=dbMap[t.winTo]; const field=t.winS===1?'game1_id':'game2_id';
          if(!dest[field]){
            await sb.from('matchups').update({[field]:m.winner_id}).eq('id',dest.id);
            dest[field]=m.winner_id;
          }
        }
        // Route loser (only if not a bye and loser destination exists)
        if(t.loseTo&&m.loser_id&&dbMap[t.loseTo]){
          const dest=dbMap[t.loseTo]; const field=t.loseS===1?'game1_id':'game2_id';
          if(!dest[field]){
            await sb.from('matchups').update({[field]:m.loser_id}).eq('id',dest.id);
            dest[field]=m.loser_id;
          }
        }
      }
      // Check for single-bye cascade: one slot filled, other feeder is 'bye'
      if(m.status==='pending'){
        const hasG1=!!m.game1_id, hasG2=!!m.game2_id;
        if(hasG1===hasG2) continue; // both or neither
        const t=tpl.find(x=>x.id===tplId); if(!t) continue;
        const emptySlot=hasG1?2:1;
        // Find which template feeds this slot
        const feederTpl=tpl.find(x=>
          (x.winTo===tplId&&x.winS===emptySlot)||(x.loseTo===tplId&&x.loseS===emptySlot)
        );
        if(feederTpl&&dbMap[feederTpl.id]?.status==='bye'){
          // The feeder was a double-bye → this slot will never be filled → auto-advance
          const winnerId=hasG1?m.game1_id:m.game2_id;
          await sb.from('matchups').update({winner_id:winnerId,status:'complete'}).eq('id',m.id);
          m.winner_id=winnerId; m.status='complete'; m._routed=false;
          changed=true;
        }
      }
    }
  }
}

// ══════════════════════════════════════════════════════════════════
// ▌ MATCH COMPLETION (route winner/loser after a real match)
// ══════════════════════════════════════════════════════════════════
async function completeMatch(matchupId, winnerId, loserId){
  await sb.from('matchups').update({winner_id:winnerId,loser_id:loserId,status:'complete'}).eq('id',matchupId);
  await loadMatchups();

  const m=matchups.find(x=>x.id===matchupId); if(!m) return;
  const tpl=getTpl(m.template_id); if(!tpl) return;

  // Route winner
  if(tpl.winTo&&winnerId){
    const dest=matchupByTplId(tpl.winTo);
    if(dest){ const f=tpl.winS===1?'game1_id':'game2_id'; await sb.from('matchups').update({[f]:winnerId}).eq('id',dest.id); }
  }
  // Route loser
  if(tpl.loseTo&&loserId){
    const dest=matchupByTplId(tpl.loseTo);
    if(dest){ const f=tpl.loseS===1?'game1_id':'game2_id'; await sb.from('matchups').update({[f]:loserId}).eq('id',dest.id); }
  }
  // Check if this is the GF → tournament over
  if(m.template_id==='GF-P1'){
    await sb.from('game_sessions').update({phase:'complete',winner_game_id:winnerId}).eq('id',session.id);
  }
  // Cascade any single-byes that result
  await loadMatchups();
  await checkAndCascade();
  tieMatchupId=null;
}

async function checkAndCascade(){
  // After a real match, check if any pending matchup became a single-bye
  const tpl=getTemplate(); if(!tpl) return;
  let changed=true;
  while(changed){
    changed=false;
    await loadMatchups();
    for(const m of matchups){
      if(m.status!=='pending') continue;
      const hasG1=!!m.game1_id, hasG2=!!m.game2_id;
      if(hasG1===hasG2) continue;
      const t=tpl.find(x=>x.id===m.template_id); if(!t) continue;
      const emptySlot=hasG1?2:1;
      const feederTpl=tpl.find(x=>(x.winTo===m.template_id&&x.winS===emptySlot)||(x.loseTo===m.template_id&&x.loseS===emptySlot));
      if(feederTpl){
        const feeder=matchups.find(x=>x.template_id===feederTpl.id);
        if(feeder&&feeder.status==='bye'){
          const winnerId=hasG1?m.game1_id:m.game2_id;
          await sb.from('matchups').update({winner_id:winnerId,status:'complete'}).eq('id',m.id);
          const t2=getTpl(m.template_id);
          if(t2&&t2.winTo&&winnerId){
            const dest=matchupByTplId(t2.winTo);
            if(dest){ const f=t2.winS===1?'game1_id':'game2_id'; await sb.from('matchups').update({[f]:winnerId}).eq('id',dest.id); }
          }
          changed=true; break;
        }
      }
    }
  }
}

    document.getElementById('admin-panel').style.display='block';

  if(!confirm(`Lock ${nominations.length} nominations and generate the bracket?`)) return;
  toast('Generating bracket...');

}
function playVoteSound(){

    const audio=new Audio('vote.mp3');
    audio.volume=0.7;

  } catch(e){}

async function adminStartVoting(matchupId){
  if(activeMatchup()){ toast('Finish the current match first','err'); return; }
  coinFlip=null;
  await sb.from('matchups').update({status:'voting'}).eq('id',matchupId);
  await loadActiveVotes();
  playVoteSound();
  nav('screen-bracket');
  toast('Voting started!','ok');
}
async function adminReveal(matchupId){
  await sb.from('matchups').update({status:'revealing'}).eq('id',matchupId);
  toast('Votes revealed!','ok');
}
async function adminComplete(matchupId){
  const m=matchups.find(x=>x.id===matchupId); if(!m) return;

  // If a coin flip already decided the winner, use it
  if(coinFlip?.matchupId===matchupId&&!coinFlip.running&&coinFlip.winnerId){
    await completeMatch(matchupId,coinFlip.winnerId,coinFlip.loserId);
    toast('The coin has spoken! Match complete.','ok');
    return;
  }

  const {data:votes}=await sb.from('votes').select('*').eq('matchup_id',matchupId);
  const g1v=(votes||[]).filter(v=>v.game_id===m.game1_id).length;
  const g2v=(votes||[]).filter(v=>v.game_id===m.game2_id).length;
  if(g1v===g2v){
    const g1=nominations.find(n=>n.id===m.game1_id);
    const g2=nominations.find(n=>n.id===m.game2_id);
    tieMatchupId=matchupId;
    toast('🤝 Tie! The oracle decides...','');
    startCoinFlip(m,g1,g2);
    return;
  }
  tieMatchupId=null;
  const winner=g1v>g2v?m.game1_id:m.game2_id;
  const loser =g1v>g2v?m.game2_id:m.game1_id;
  await completeMatch(matchupId,winner,loser);
  toast('Match complete!','ok');
}
async function adminForceWinner(matchupId,winnerId){
  const m=matchups.find(x=>x.id===matchupId); if(!m) return;
  const loserId=winnerId===m.game1_id?m.game2_id:m.game1_id;
  tieMatchupId=null;
  await completeMatch(matchupId,winnerId,loserId);
  toast('Winner set!','ok');
}
async function adminReset(){
  if(!confirm('Reset entire session? All data will be deleted.')) return;
  if(!confirm('Sure? This cannot be undone.')) return;
  await sb.from('game_sessions').delete().eq('id',session.id);
  session=null; nominations=[]; matchups=[]; isAdmin=false;
  document.getElementById('admin-gate').style.display='block';
  document.getElementById('admin-panel').style.display='none';
  document.getElementById('nav-tabs').classList.remove('show');
  nav('screen-lobby'); renderLobby(); updateHeader(); toast('Session reset','ok');
}

function nav(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  activeScreen=id;
  const tabMap={'screen-nominate':'tab-nominate','screen-bracket':'tab-bracket','screen-vote':'tab-vote','screen-admin':'tab-admin'};
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  const activeTab=document.getElementById(tabMap[id]);
  if(activeTab) activeTab.classList.add('active');
  if(id==='screen-nominate'){ renderNomScreen(); startNominationsPolling(); }
  else { stopNominationsPolling(); }
  if(id==='screen-bracket')  renderBracket();
  if(id==='screen-vote')     renderVoteScreen();
  if(id==='screen-admin')    renderAdminContent();
}
function toggleAdmin(){ nav(activeScreen==='screen-admin'?(session?'screen-nominate':'screen-lobby'):'screen-admin'); }

function updateHeader(){
  document.getElementById('header-nick').textContent=nickname?`👤 ${nickname}`:'';
  // Show nav tabs whenever we have a nickname (even on admin screen)
  if(nickname) document.getElementById('nav-tabs').classList.add('show');
  // Show admin tab in nav if logged in as admin
  const adminTab=document.getElementById('tab-admin');
  if(adminTab) adminTab.style.display=isAdmin?'':'none';
  const ph=document.getElementById('header-phase');
  if(!session){ ph.textContent=''; ph.className=''; return; }
  const labels={nominating:'Nominations Open',bracket:'Tournament Active',complete:'🏆 Complete'};
  ph.textContent=labels[session.phase]||session.phase;
  ph.className='ph-'+session.phase;
  const a=activeMatchup();
  document.getElementById('tab-vote').classList.toggle('has-ping',!!a);
  // Badge on admin tab if pending join requests
  const pending=joinRequests.filter(r=>r.status==='pending').length;
  const adminBtn=document.querySelector('.btn-admin-toggle');
  if(adminBtn) adminBtn.textContent=pending?`ADMIN 🔴`:'ADMIN';
  if(adminTab&&pending) adminTab.textContent=`ADMIN 🔴`;
  else if(adminTab&&isAdmin) adminTab.textContent='ADMIN';
}

function renderLobby(){
  const el=document.getElementById('lobby-card');
  if(!session){
    el.innerHTML=`<h2 style="color:var(--cream);font-family:var(--font-h);font-style:italic;margin-bottom:12px;">No Active Session</h2>
      <p style="color:var(--text-dim);font-size:14px;margin-bottom:20px;">Ask the host to create one, or open Admin and start a session yourself.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-amber" onclick="toggleAdmin()">⚙ Open Admin</button>
        <button class="btn btn-ghost" onclick="init()">↻ Refresh</button>
      </div>`;
    return;
  }
  if(!nickname){
    if(session.phase==='bracket'||session.phase==='complete'){
      const myReq=joinRequests.find(r=>r.device_token===deviceToken);
      if(myReq?.status==='pending'){
        el.innerHTML=`<h2 style="color:var(--gold);font-family:var(--font-h);font-style:italic;margin-bottom:12px;">⏳ Request Pending</h2>
          <p style="color:var(--text-dim);font-size:14px;">Waiting for the admin to let you in...</p>
          <div class="pulse-row" style="margin-top:20px;"><div class="dot"></div><span style="color:var(--text-dim);">Standby, ${esc(myReq.nickname)}</span></div>`;
      } else if(myReq?.status==='denied'){
        el.innerHTML=`<h2 style="color:var(--red);font-family:var(--font-h);font-style:italic;margin-bottom:12px;">Request Denied</h2>
          <p style="color:var(--text-dim);font-size:14px;">The admin said no. Try again next time.</p>`;
      } else {
        el.innerHTML=`<h2 style="color:var(--cream);font-family:var(--font-h);font-style:italic;margin-bottom:12px;">🔒 Bracket In Progress</h2>
          <p style="color:var(--text-dim);font-size:14px;margin-bottom:20px;">Nominations are closed — but you can request to join as a <strong style="color:var(--gold);">voter only</strong>.</p>
          <div class="form-group">
            <label>Your Nickname</label>
            <input type="text" id="nick-input" placeholder="Enter your name" maxlength="20"
              onkeydown="if(event.key==='Enter')requestLateJoin()">
          </div>
          <button class="btn btn-amber" style="width:100%;" onclick="requestLateJoin()">📨 Request to Join</button>`;
        setTimeout(()=>{ const i=document.getElementById('nick-input'); if(i) i.focus(); },50);
      }
      return;
    }
    el.innerHTML=`<h2 style="color:var(--cream);font-family:var(--font-h);font-style:italic;margin-bottom:20px;">Enter The Floor</h2>
      <div class="form-group">
        <label>Your Nickname</label>
        <input type="text" id="nick-input" placeholder="Who are you?" maxlength="20"
          onkeydown="if(event.key==='Enter')enterNick()">
      </div>
      <button class="btn btn-amber" style="width:100%;" onclick="enterNick()">Enter 🎮</button>`;
    setTimeout(()=>{ const el=document.getElementById('nick-input'); if(el) el.focus(); },50);
    return;
  }
  document.getElementById('nav-tabs').classList.add('show');
  const a=activeMatchup();
  if(session.phase==='bracket'&&a) nav('screen-vote');
  else if(session.phase==='bracket'||session.phase==='complete') nav('screen-bracket');
  else nav('screen-nominate');
}
function enterNick(){
  const el=document.getElementById('nick-input'); if(!el) return;
  const n=el.value.trim(); if(!n) return;
  nickname=n; localStorage.setItem('nickname',n);
  document.getElementById('header-nick').textContent=`👤 ${n}`;
  document.getElementById('nav-tabs').classList.add('show');
  renderLobby();
}
async function requestLateJoin(){

  const n=el.value.trim(); if(!n){ toast('Enter a nickname first','err'); return; }

    else toast('Error: '+error.message,'err');

  toast('Request sent! Waiting for admin...','ok');

}
async function approveLateJoin(requestId){

  await loadJoinRequests();
  renderAdminContent();
  toast('User approved ✓','ok');

async function denyLateJoin(requestId){

}

function renderNomScreen(){
  const mine=nominations.filter(n=>n.submitted_by===nickname);
  const max=session?.max_noms_per_person||2;
  const canNom=session?.phase==='nominating'&&mine.length<max;
  document.getElementById('nom-count-badge').textContent=`${nominations.length} nominated`;

  const st=document.getElementById('nom-my-status');
  if(session?.phase!=='nominating'){
    st.innerHTML=`<div class="nom-status-msg" style="color:var(--amber);">🔒 Nominations are closed</div>`;
  } else if(mine.length>=max){
    st.innerHTML=`<div class="nom-status-msg" style="color:var(--green);">✓ You've submitted ${mine.length}/${max} nomination${max>1?'s':''}</div>`;
  } else {
    st.innerHTML=`<div class="nom-status-msg" style="color:var(--text-dim);">Submit up to <strong>${max}</strong> game${max>1?'s':''} &mdash; ${mine.length}/${max} done</div>`;
  }

  // Show full list FIRST so people see what's already in before typing
  const list=document.getElementById('nom-list');
  if(!nominations.length){
    list.innerHTML=`<div style="text-align:center;color:var(--text-muted);padding:16px 0;">No games nominated yet — be the first!</div>`;
  } else {
    list.innerHTML=nominations.map(n=>{
      const isMe=n.submitted_by===nickname;
      return `<div class="nom-item${isMe?' mine':''}">
        <span class="nom-game">${esc(n.game_name)}</span>
        <span class="nom-by">${esc(n.submitted_by)}${isMe?' (you)':''}</span>
      </div>`;
    }).join('');
  }

  // Form below the list
  document.getElementById('nom-form-area').innerHTML=canNom?`
    <hr class="divider">
    <div class="nom-form">
      <input type="text" id="nom-input" placeholder="Nominate a game..." maxlength="60"
        onkeydown="if(event.key==='Enter')submitNom()">
      <button class="btn btn-cyan" onclick="submitNom()">NOMINATE</button>
    </div>
  `:session?.phase==='nominating'?`<hr class="divider">`:'';
}
async function submitNom(){
  const el=document.getElementById('nom-input'); if(!el) return;
  const name=el.value.trim(); if(!name) return;
  if(!nickname){ toast('Enter your nickname first!','err'); nav('screen-lobby'); renderLobby(); return; }
  if(nominations.some(n=>n.game_name.toLowerCase()===name.toLowerCase())){
    toast('Already nominated!','err'); return;
  }
  const max=session?.max_noms_per_person||2;
  if(nominations.filter(n=>n.submitted_by===nickname).length>=max){
    toast(`Max ${max} nominations per person`,'err'); return;
  }
  const {error}=await sb.from('nominations').insert({session_id:session.id,game_name:name,submitted_by:nickname});
  if(error){ toast('Error: '+error.message,'err'); return; }
  el.value=''; toast(`"${name}" nominated!`,'ok');
  await loadNominations(); renderNomScreen();
}

// ══════════════════════════════════════════════════════════════════
function renderBracket(){
  const el=document.getElementById('bracket-container');
  if(!matchups.length){
    el.innerHTML=`<div style="text-align:center;padding:60px;color:var(--text-muted);">Bracket not generated yet</div>`;
    return;
  }
  const a=activeMatchup();
  const liveBanner=a?`
    <div onclick="nav('screen-vote')" style="
      cursor:pointer; margin:0 20px 20px; padding:14px 20px;
      background:var(--gold-dim); border:1px solid var(--gold); border-radius:var(--r);
      display:flex; align-items:center; gap:12px;
    ">
      <div style="width:8px;height:8px;border-radius:50%;background:var(--gold);animation:ping .8s ease-in-out infinite;flex-shrink:0;"></div>
      <div>
        <div style="font-family:var(--font-h);font-style:italic;color:var(--gold);font-size:16px;">Voting Is Live</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:2px;">Tap here to go vote →</div>
      </div>
    </div>`:'';
  const tpl=getTemplate();
  const W=matchups.filter(m=>m.bracket==='winners');
  const L=matchups.filter(m=>m.bracket==='losers');
  const GF=matchups.filter(m=>m.bracket==='grand_final');
  const wRounds=[...new Set(W.map(m=>m.round))].sort((a,b)=>a-b);
  const lRounds=[...new Set(L.map(m=>m.round))].sort((a,b)=>a-b);
  const maxWR=Math.max(...wRounds);

  // Champion banner if complete
  let champHtml='';
  if(session?.phase==='complete'&&session.winner_game_id){
    const c=nominations.find(n=>n.id===session.winner_game_id);
    champHtml=`<div class="champ-banner">
      <div class="champ-emoji">🏆</div>
      <div class="champ-label">TONIGHT WE PLAY</div>
      <div class="champ-name">${esc(c?.game_name||'Champion')}</div>
    </div>`;
  }

  el.innerHTML=liveBanner+champHtml+`
    <div class="bracket-section">
      <div class="b-section-label winners">WINNERS BRACKET</div>
      <div class="bracket-rounds">
        ${wRounds.map(r=>{
          const ms=W.filter(m=>m.round===r).sort((a,b)=>a.position-b.position);
          const label=r===maxWR?'Winners Final':`Round ${r}`;
          return `<div class="bracket-col">
            <div class="round-label">${label}</div>
            <div class="round-matches">${ms.map((m,i)=>(i>0?'<div class="b-spacer"></div>':'')+cardHtml(m,tpl)).join('')}</div>
          </div>`;
        }).join('')}
        ${GF.length?`
        <div class="bracket-col" style="border-left:1px solid var(--border2);margin-left:4px;padding-left:4px;">
          <div class="round-label" style="color:var(--gold-bright);letter-spacing:2px;">⚔ GRAND FINAL</div>
          <div class="round-matches">${GF.map(m=>cardHtml(m,tpl)).join('')}</div>
        </div>`:''}
      </div>
    </div>
    ${L.length?`
    <div class="bracket-section">
      <div class="b-section-label losers">LOSERS BRACKET</div>
      <div class="bracket-rounds">
        ${lRounds.map(r=>{
          const ms=L.filter(m=>m.round===r).sort((a,b)=>a.position-b.position);
          return `<div class="bracket-col">
            <div class="round-label">Round ${r}</div>
            <div class="round-matches">${ms.map((m,i)=>(i>0?'<div class="b-spacer"></div>':'')+cardHtml(m,tpl)).join('')}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`:''}
  `;
}

function cardHtml(m,tpl){
  const g1=m.game1_id?nominations.find(n=>n.id===m.game1_id):null;
  const g2=m.game2_id?nominations.find(n=>n.id===m.game2_id):null;
  const pills={pending:'st-pill-pending',voting:'st-pill-voting',revealing:'st-pill-revealing',complete:'st-pill-complete',bye:'st-pill-bye'};
  const pillLabels={pending:'Pending',voting:'🔴 Voting',revealing:'👁 Revealed',complete:'✓ Done',bye:'Bye'};
  const isTie=tieMatchupId===m.id;

  // Determine game win/loss state for completed matches
  const g1done=m.status==='complete'||m.status==='bye';
  const g1cls=g1done?(m.winner_id===m.game1_id?'won':'lost'):'';
  const g2cls=g1done?(m.winner_id===m.game2_id?'won':'lost'):'';

  // Voting state
  const isVoting=m.status==='voting';
  const isRevealing=m.status==='revealing';
  const mv=activeVotes.find(v=>v.matchup_id===m.id&&v.device_token===deviceToken);
  const totalVotes=activeVotes.filter(v=>v.matchup_id===m.id).length;
  const g1v=activeVotes.filter(v=>v.matchup_id===m.id&&v.game_id===m.game1_id).length;
  const g2v=activeVotes.filter(v=>v.matchup_id===m.id&&v.game_id===m.game2_id).length;

  // Build vote rows
  let voteHtml='';
  if(isVoting||isRevealing){
    const canVote=isVoting&&!mv;
    const rows=[
      {game:g1,gid:m.game1_id,gv:g1v,isWin:isRevealing&&g1v>g2v,isLose:isRevealing&&g2v>g1v},
      {game:g2,gid:m.game2_id,gv:g2v,isWin:isRevealing&&g2v>g1v,isLose:isRevealing&&g1v>g2v},
    ];
    const rowsHtml=rows.map(({game,gid,gv,isWin,isLose})=>{
      const myPick=mv?.game_id===gid;
      let rowCls='b-vote-row';
      if(myPick) rowCls+=' my-vote';
      if(isRevealing&&isWin) rowCls+=' win-row';
      if(isRevealing&&isLose) rowCls+=' lose-row';
      if(mv||isRevealing) rowCls+=' voted';
      const clickFn=canVote&&gid?`castVote('${m.id}','${gid}')`:'';
      return `<div class="${rowCls}" ${clickFn?`onclick="${clickFn}"`:''}
        style="${canVote?'cursor:pointer;':'cursor:default;'}">
        <span class="b-vote-name${game?'':' tbd'}">${game?esc(game.game_name):'TBD'}</span>
        ${myPick?`<span class="b-vote-check">✓ you</span>`:''}
        ${isRevealing?`<span class="b-vote-count">${gv}</span>`:''}
      </div>`;
    }).join('');

    voteHtml=`<div class="b-vote-area">
      ${rowsHtml}
      <div class="b-vote-footer">
        <span>${mv?'Vote cast':'Click to vote'}</span>
        <span>${totalVotes} vote${totalVotes!==1?'s':''} cast</span>
      </div>
    </div>`;
  } else {
    // Not voting — show plain game names
    voteHtml=`
      <div class="b-game ${g1?g1cls:'tbd'}">${g1?esc(g1.game_name):'TBD'}</div>
      <div class="b-vs">VS</div>
      <div class="b-game ${g2?g2cls:'tbd'}">${g2?esc(g2.game_name):'TBD'}</div>`;
  }

  // Admin controls
  const canStart=isAdmin&&m.status==='pending'&&m.game1_id&&m.game2_id;
  const canReveal=isAdmin&&m.status==='voting';
  const canComplete=isAdmin&&m.status==='revealing';
  const adminHtml=(canStart||canReveal||canComplete)?`
    <div class="b-actions">
      ${canStart?`<button class="btn btn-cyan btn-sm" onclick="adminStartVoting('${m.id}')">▶ Start</button>`:''}
      ${canReveal?`<button class="btn btn-amber btn-sm" onclick="adminReveal('${m.id}')">👁 Reveal</button>`:''}
      ${canComplete&&!isTie?`<button class="btn btn-green btn-sm" onclick="adminComplete('${m.id}')">✓ Complete</button>`:''}
      ${isTie?`<div style="width:100%;font-size:10px;color:var(--gold);margin-bottom:4px;">TIE — oracle decides</div>`:''}
    </div>`:'';

  return `<div class="b-card st-${m.status}">
    <div class="b-card-top">
      <span>${esc(m.template_id)}</span>
      <span class="st-pill ${pills[m.status]||'st-pill-pending'}">${pillLabels[m.status]||m.status}</span>
    </div>
    ${voteHtml}
    ${adminHtml}
  </div>`;
}

// ▌ RENDERING — VOTE SCREEN
// ══════════════════════════════════════════════════════════════════
function renderVoteScreen(){
  const el=document.getElementById('vote-container');
  const a=activeMatchup();

  if(!a){
    if(session?.phase==='complete'&&session.winner_game_id){
      const c=nominations.find(n=>n.id===session.winner_game_id);
      el.innerHTML=`<div class="champ-banner">
        <div class="champ-emoji">🏆</div>
        <div class="champ-label">TONIGHT WE PLAY</div>
        <div class="champ-name">${esc(c?.game_name||'Champion')}</div>
      </div>`;
    } else {
      el.innerHTML=`<div style="text-align:center;">
        <div class="vote-label">WAITING FOR HOST</div>
        <div style="color:var(--text-muted);font-size:14px;margin-top:8px;">The next match will start soon</div>
        <div class="pulse-row" style="margin-top:20px;"><div class="dot"></div><span>Standby...</span></div>
      </div>`;
    }
    return;
  }

  const g1=nominations.find(n=>n.id===a.game1_id);
  const g2=nominations.find(n=>n.id===a.game2_id);
  const mv=myVote(a.id);
  const revealing=a.status==='revealing';
  const g1v=activeVotes.filter(v=>v.game_id===a.game1_id).length;
  const g2v=activeVotes.filter(v=>v.game_id===a.game2_id).length;
  const total=activeVotes.length;
  const isTie=tieMatchupId===a.id;
  const flipDone=coinFlip?.matchupId===a.id&&!coinFlip.running;

  let g1cls='', g2cls='';
  if(mv?.game_id===a.game1_id) g1cls='my-pick';
  if(mv?.game_id===a.game2_id) g2cls='my-pick';
  if(revealing){
    if(isTie){
      // During coin flip: show both as tie-reveal until flip is done
      if(flipDone){
        g1cls=coinFlip.winnerId===a.game1_id?'win-reveal':'lose-reveal';
        g2cls=coinFlip.winnerId===a.game2_id?'win-reveal':'lose-reveal';
      } else { g1cls='tie-reveal'; g2cls='tie-reveal'; }
    } else if(g1v>g2v){ g1cls='win-reveal'; g2cls='lose-reveal'; }
    else if(g2v>g1v){ g2cls='win-reveal'; g1cls='lose-reveal'; }
    else { g1cls='tie-reveal'; g2cls='tie-reveal'; }
  }

  // Auto-start tie-breaker for everyone when a tie is revealed
  if(revealing&&isTie&&!coinFlip?.matchupId) startCoinFlip(a,g1,g2);

  const barG1=total>0?Math.round(g1v/total*100):50;
  const barG2=100-barG1;

  const g1voters=activeVotes.filter(v=>v.game_id===a.game1_id).map(v=>v.voter_name||'?');
  const g2voters=activeVotes.filter(v=>v.game_id===a.game2_id).map(v=>v.voter_name||'?');

  el.innerHTML=`
    <div class="vote-label">CURRENT MATCH</div>
    <div class="vote-round-name">${esc(bracketLabel(a.template_id))}</div>
    <div class="vote-arena">
      <div class="vote-card ${g1cls} ${mv?'voted':''} ${revealing?'revealing':''}"
           onclick="${!mv&&!revealing?`castVote('${a.id}','${a.game1_id}')`:''}" style="${!mv&&!revealing?'':'cursor:default'}">
        ${mv?.game_id===a.game1_id?'<span class="v-my-badge">YOUR VOTE</span>':''}
        <div class="v-game-name">${esc(g1?.game_name||'TBD')}</div>
        ${revealing?`<div class="v-vote-count">${g1v}</div><div class="v-vote-label">vote${g1v!==1?'s':''}</div>${g1voters.length?`<div class="v-voters">${g1voters.map(n=>`<span class="v-voter-chip">${esc(n)}</span>`).join('')}</div>`:''}`:''}
      </div>
      <div class="vote-vs">VS</div>
      <div class="vote-card ${g2cls} ${mv?'voted':''} ${revealing?'revealing':''}"
           onclick="${!mv&&!revealing?`castVote('${a.id}','${a.game2_id}')`:''}" style="${!mv&&!revealing?'':'cursor:default'}">
        ${mv?.game_id===a.game2_id?'<span class="v-my-badge">YOUR VOTE</span>':''}
        <div class="v-game-name">${esc(g2?.game_name||'TBD')}</div>
        ${revealing?`<div class="v-vote-count">${g2v}</div><div class="v-vote-label">vote${g2v!==1?'s':''}</div>${g2voters.length?`<div class="v-voters">${g2voters.map(n=>`<span class="v-voter-chip">${esc(n)}</span>`).join('')}</div>`:''}`:''}
      </div>
    </div>
    ${revealing?`<div class="vote-bar"><div class="bg1" style="width:${barG1}%"></div><div class="bg2" style="width:${barG2}%"></div></div>`:''}
    <div class="vote-status">
      ${revealing
        ? isTie
          ? flipDone
            ? `🪙 The coin has spoken! <strong style="color:var(--green)">${esc(nominations.find(n=>n.id===coinFlip.winnerId)?.game_name||'?')}</strong> advances!`
            : `🪙 IT'S A TIE &mdash; COIN FLIP IN PROGRESS...`
          : `${total} vote${total!==1?'s':''} &mdash; ${g1v===g2v?'🤝 Tie!':'🏆 '+esc(g1v>g2v?(g1?.game_name||'?'):(g2?.game_name||'?'))+' wins the people\'s vote!'}`
        : mv
          ? `<div class="pulse-row"><div class="dot"></div><span>Vote cast! Waiting for the reveal...</span></div>`
          : `👆 Click a game to cast your vote <span style="color:var(--text-muted)">(${total} cast so far)</span>`
      }
    </div>
    ${revealing&&isTie?`
    <div class="coin-flip-zone">
      <div class="coin-flip-label">🪙 COIN FLIP</div>
      <div class="coin-display" id="coin-display">${esc(g1?.game_name||'?')}</div>
      ${flipDone?`<div class="coin-winner-msg">✓ ${esc(nominations.find(n=>n.id===coinFlip.winnerId)?.game_name||'?')} has been chosen by the gods of RNG</div>`:''}
    </div>`:''}
    ${isAdmin?`
    <div class="vote-admin-row">
      ${a.status==='voting'?`<button class="btn btn-amber" onclick="adminReveal('${a.id}')">👁 Reveal Votes</button>`:''}
      ${a.status==='revealing'&&!isTie?`<button class="btn btn-green" onclick="adminComplete('${a.id}')">✓ Complete Match</button>`:''}
      ${a.status==='revealing'&&isTie&&!flipDone?`<button class="btn btn-amber" onclick="adminComplete('${a.id}')">🪙 Flip The Coin</button>`:''}
      ${a.status==='revealing'&&isTie&&flipDone?`<button class="btn btn-green" onclick="adminComplete('${a.id}')">✓ Accept Coin Flip Result</button>`:''}
    </div>
    `:''}
  `;
}

// ▌ RENDERING — ADMIN PANEL
// ══════════════════════════════════════════════════════════════════
function renderAdminContent(){
  if(!isAdmin) return;
  const el=document.getElementById('admin-content'); if(!el) return;

  if(!session){
    el.innerHTML=`<div class="admin-sec">
      <h3>CREATE SESSION</h3>
      <div class="form-group"><label>Max nominations per person</label><input type="number" id="new-max" value="2" min="1" max="5" style="width:80px;"></div>
      <button class="btn btn-amber" onclick="adminCreateSession()">CREATE SESSION</button>
    </div>`;
    return;
  }

  const a=activeMatchup();
  el.innerHTML=`
    <div class="admin-sec">
      <h3>SESSION INFO</h3>
      <div class="info-grid">
        <div class="info-row"><span class="info-k">Phase</span><span class="info-v hi">${session.phase.toUpperCase()}</span></div>
        <div class="info-row"><span class="info-k">Games nominated</span><span class="info-v">${nominations.length}</span></div>
        <div class="info-row"><span class="info-k">Max per person</span><span class="info-v">${session.max_noms_per_person}</span></div>
        ${a?`<div class="info-row"><span class="info-k">Active match</span><span class="info-v hi">${a.template_id} (${a.status})</span></div>
        <div class="info-row"><span class="info-k">Votes cast</span><span class="info-v">${activeVotes.length}</span></div>`:''}
      </div>
    </div>
    ${session.phase==='nominating'?`
    <div class="admin-sec">
      <h3>WHO'S SUBMITTED</h3>
      ${(()=>{
        const max=session.max_noms_per_person;
        const byPerson={};
        nominations.forEach(n=>{ if(!byPerson[n.submitted_by]) byPerson[n.submitted_by]=[]; byPerson[n.submitted_by].push(n.game_name); });
        if(!Object.keys(byPerson).length) return `<p style="color:var(--text-muted);font-size:13px;">Nobody has nominated yet.</p>`;
        return Object.entries(byPerson).map(([name,games])=>`
          <div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
            <div style="font-weight:700;min-width:110px;font-size:13px;padding-top:2px;">${esc(name)}</div>
            <div style="display:flex;flex-direction:column;gap:3px;flex:1;">
              ${games.map(g=>`<span style="font-size:12px;color:var(--cyan);">🎮 ${esc(g)}</span>`).join('')}
              ${games.length<max?`<span style="font-size:11px;color:var(--amber);">${max-games.length} more slot${max-games.length>1?'s':''} remaining</span>`:'<span style="font-size:11px;color:var(--green);">✓ Done</span>'}
            </div>
          </div>`).join('');
      })()}
    </div>
    <div class="admin-sec">
      <h3>GENERATE BRACKET</h3>
      <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">${nominations.length} game${nominations.length!==1?'s':''} nominated. Need at least 4 to generate a bracket.</p>
      <button class="btn btn-cyan" onclick="adminLockAndGenerate()" ${nominations.length<4?'disabled':''}>🎲 Lock & Generate Bracket</button>
    </div>`:''}
    ${session.phase!=='nominating'&&joinRequests.length?`
    <div class="admin-sec">
      <h3>JOIN REQUESTS</h3>
      ${joinRequests.map(r=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
          <div style="flex:1;">
            <div style="font-weight:700;font-size:13px;">${esc(r.nickname)}</div>
            <div style="font-size:11px;color:var(--text-muted);">wants to join as voter</div>
          </div>
          ${r.status==='pending'?`
            <button class="btn btn-green btn-sm" onclick="approveLateJoin('${r.id}')">✓ Let In</button>
            <button class="btn btn-ghost btn-sm" onclick="denyLateJoin('${r.id}')">✕ Deny</button>
          `:`<span style="font-size:11px;font-weight:700;color:${r.status==='approved'?'var(--green)':'var(--text-muted)'}">${r.status==='approved'?'✓ Approved':'✕ Denied'}</span>`}
        </div>`).join('')}
    </div>`:''}
    ${session.phase==='complete'?`
    <div class="admin-sec">
      <h3>🏆 TOURNAMENT COMPLETE</h3>
      <div style="font-family:var(--font-h);font-size:22px;color:var(--green);margin-bottom:8px;">${esc(nominations.find(n=>n.id===session.winner_game_id)?.game_name||'Unknown')}</div>
      <p style="color:var(--text-dim);font-size:13px;">That's what you're playing tonight. Good choice.</p>
    </div>`:''}
    <div class="admin-sec">
      <h3>DANGER ZONE</h3>
      <button class="btn btn-red btn-sm" onclick="adminReset()">🗑 Reset Session</button>
    </div>
  `;
}

// ▌ INIT
// ══════════════════════════════════════════════════════════════════
async function init(){
  deviceToken=localStorage.getItem('dt')||uuid();
  localStorage.setItem('dt',deviceToken);
  nickname=localStorage.getItem('nickname')||'';
  if(nickname) document.getElementById('header-nick').textContent=`👤 ${nickname}`;

  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  if(LOBBY_BG_URL){ document.getElementById('lobby-bg').style.backgroundImage=`url('${LOBBY_BG_URL}')`; }
  await loadSession();
  if(session) await loadActiveVotes();
  setupRealtime();
  updateHeader();

  if(session&&nickname){
    document.getElementById('nav-tabs').classList.add('show');
    const a=activeMatchup();
    if(session.phase==='bracket'&&a) nav('screen-vote');
    else if(session.phase==='bracket'||session.phase==='complete') nav('screen-bracket');
    else nav('screen-nominate');
    renderNomScreen();
  } else {
    nav('screen-lobby');
    renderLobby();
  }
}

init();
